name: Deploy DC Elections Tracker to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dc-elections-tracker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dc-elections-tracker/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: /dcelectionstracker
        run: npm run build

      # Regression guard for UAT-008: <Link> hrefs were getting basePath
      # prepended twice, producing /dcelectionstracker/dcelectionstracker/...
      # 404s on every internal nav. Anything that re-introduces manual
      # basePath prefixing inside <Link> will trip this check.
      - name: Assert no double-prefixed basePath in build output
        run: |
          if grep -rE "dcelectionstracker/dcelectionstracker/" out/; then
            echo "::error::Double-prefixed basePath in build output — see UAT-008"
            exit 1
          fi

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dc-elections-tracker/out

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
